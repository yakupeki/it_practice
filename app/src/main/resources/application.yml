spring:
  application:
    name: SampleApp
  datasource:
    url: ${DB_URL:jdbc:h2:mem:sampledb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1}
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  thymeleaf:
    cache: false

logging:
  level:
    root: ${LOG_LEVEL:INFO}
